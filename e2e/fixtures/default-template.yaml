apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: default
  namespace: default
  labels:
    workspace.jupyter.org/default-template: 'true'
spec:
  displayName: Default
  description: Default workspace template for E2E tests
  appType: jupyterlab
  defaultImage: nginx:latest
  # allowedImages + resourceBounds exercise the advanced editor's template guidance
  # and the dry-run rejection path. nginx:latest stays in the list so the
  # default-create flow (which relies on the template default image) still admits.
  allowedImages:
    - nginx:latest
    - nginx:1.27
  defaultResources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '512Mi'
  resourceBounds:
    resources:
      cpu:
        min: '100m'
        max: '2'
      memory:
        min: '128Mi'
        max: '2Gi'
  primaryStorage:
    defaultSize: '1Gi'
    minSize: '1Gi'
    maxSize: '10Gi'
    defaultMountPath: '/data'
