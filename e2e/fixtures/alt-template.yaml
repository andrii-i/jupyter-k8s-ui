# A second (non-default) WorkspaceTemplate so the picker renders a selectable card grid
# (the default template alone would auto-hide the picker). Distinct displayName + a
# different appType (code-server → no registered logo → fallback icon), plus an enabled
# idleShutdown block so the detail page's Idle-shutdown row shows a timeout, not "Disabled".
apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: alt-template
  namespace: default
  labels:
    workspace.jupyter.org/default-template: 'false'
spec:
  displayName: Alt Template
  description: Non-default template for E2E selection tests
  appType: code-server
  defaultImage: nginx:latest
  allowedImages:
    - nginx:latest
    - nginx:1.27
  defaultResources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '512Mi'
  resourceBounds:
    resources:
      cpu:
        min: '100m'
        max: '2'
      memory:
        min: '128Mi'
        max: '2Gi'
  primaryStorage:
    defaultSize: '1Gi'
    minSize: '1Gi'
    maxSize: '10Gi'
    defaultMountPath: '/data'
  defaultIdleShutdown:
    enabled: true
    idleTimeoutInMinutes: 30
    detection:
      httpGet:
        path: /
        port: 80
  idleShutdownOverrides:
    allow: true
    minIdleTimeoutInMinutes: 15
    maxIdleTimeoutInMinutes: 120
