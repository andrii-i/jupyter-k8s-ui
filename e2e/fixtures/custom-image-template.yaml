# A non-default template that ALLOWS custom images while also curating a suggestion list.
# This is the free-solo image path (allowCustomImages: true + allowedImages): the UI shows
# an editable combobox that offers the allowedImages as suggestions but still accepts any
# typed value. Regression coverage for the resolver/guidance bugs that dropped allowedImages
# whenever allowCustomImages was set.
apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: custom-image-template
  namespace: default
  labels:
    workspace.jupyter.org/default-template: 'false'
spec:
  displayName: Custom Image Template
  description: Allows custom images with curated suggestions
  appType: jupyterlab
  defaultImage: nginx:latest
  allowCustomImages: true
  allowedImages:
    - nginx:latest
    - nginx:1.27
  defaultResources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '512Mi'
  resourceBounds:
    resources:
      cpu:
        min: '100m'
        max: '2'
      memory:
        min: '128Mi'
        max: '2Gi'
  primaryStorage:
    defaultSize: '1Gi'
    minSize: '1Gi'
    maxSize: '10Gi'
    defaultMountPath: '/data'
